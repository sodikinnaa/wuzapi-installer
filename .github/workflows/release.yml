name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Build Application
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="wuzapi"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="wuzapi.exe"
          fi
          
          # Compile with optimization flags and strip symbols
          go build -ldflags="-w -s" -o "$BINARY_NAME" .
          
          # Setup artifact naming
          TAG_NAME="${{ github.ref_name }}"
          ARTIFACT_NAME="wuzapi-${TAG_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv "$BINARY_NAME" "${ARTIFACT_NAME}.exe"
            echo "FILE_PATH=${ARTIFACT_NAME}.exe" >> $GITHUB_ENV
          else
            mv "$BINARY_NAME" "$ARTIFACT_NAME"
            echo "FILE_PATH=${ARTIFACT_NAME}" >> $GITHUB_ENV
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wuzapi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.FILE_PATH }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: List Artifacts
        run: ls -lh ./artifacts

      - name: Create GitHub Release and Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
